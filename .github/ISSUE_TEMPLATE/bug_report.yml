name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Choose Folder A...\n2. Choose Folder B...\n3. Start comparison..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant status/log output

