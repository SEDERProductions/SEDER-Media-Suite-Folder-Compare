name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo fmt
        run: cargo fmt --check --manifest-path Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path Cargo.toml -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path Cargo.toml

      - name: Build release library
        run: cargo build --manifest-path Cargo.toml --release --lib

  qt-desktop:
    name: Qt build and tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.*"
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libfuse2 desktop-file-utils patchelf libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ninja cmake -y

      - name: Verify Qt installation
        shell: bash
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          ls -la "$QT_ROOT_DIR/lib/cmake/Qt6" 2>/dev/null || true

      - name: Test find Qt6
        shell: bash
        run: |
          mkdir -p /tmp/test-qt
          cat > /tmp/test-qt/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(TestQt LANGUAGES CXX)
          find_package(Qt6 6.5 REQUIRED COMPONENTS Core Gui Qml Quick QuickControls2 Widgets Test)
          message(STATUS "Qt6 found at ${Qt6_DIR}")
          EOF
          cmake -S /tmp/test-qt -B /tmp/test-qt/build -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" || {
            echo "::error::find_package(Qt6) failed"
            exit 1
          }

      - name: Configure
        run: cmake -S qt -B build/qt -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build/qt --config Release

      - name: Test
        run: ctest --test-dir build/qt --build-config Release --output-on-failure
