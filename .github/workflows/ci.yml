name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo fmt
        run: cargo fmt --check --manifest-path Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path Cargo.toml -- -D warnings

      - name: Cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cargo test
        run: cargo test --manifest-path Cargo.toml

      - name: Build release library
        run: cargo build --manifest-path Cargo.toml --release --lib

  qt-desktop:
    name: Qt build and tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.*"
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libfuse2 desktop-file-utils patchelf libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ninja cmake -y

      - name: Configure
        run: cmake -S qt -B build/qt -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build/qt --config Release

      - name: Check clang-format
        if: runner.os == 'Linux'
        run: |
          find qt/src qt/tests -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror

      - name: Test
        run: ctest --test-dir build/qt --build-config Release --output-on-failure
