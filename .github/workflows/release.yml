name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v1.2.3). Leave empty to use existing tag or branch."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    if: "github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version to')"
    outputs:
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and tag
        id: bump
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"

          if [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            new_patch=$((patch + 1))
            new_tag="v${major}.${minor}.${new_patch}"
          else
            new_tag="v0.1.0"
          fi

          echo "New tag: $new_tag"
          echo "release_tag=$new_tag" >> "$GITHUB_OUTPUT"

          version_no_v="${new_tag#v}"
          sed -i "s/^version = \".*\"/version = \"${version_no_v}\"/" Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No version changes, skipping commit"
          else
            git add Cargo.toml
            git commit -m "chore: bump version to ${new_tag}"
            git tag "$new_tag"
            git pull --rebase origin main || true
            git push origin HEAD:main
            git push origin "$new_tag"
          fi

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: tag
    if: always() && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            ext: zip
          - name: Windows
            runner: windows-latest
            ext: zip
          - name: Linux
            runner: ubuntu-22.04
            ext: AppImage

    steps:
      - name: Determine release tag
        id: vars
        shell: bash
        run: |
          if [ -n "${{ needs.tag.outputs.release_tag }}" ]; then
            release_tag="${{ needs.tag.outputs.release_tag }}"
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            release_tag="${{ github.ref_name }}"
          else
            release_tag="manual"
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "Artifact release tag: $release_tag"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.release_tag }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.*"
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libfuse2 desktop-file-utils patchelf libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ninja -y

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -S qt -B build/qt -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build/qt

      - name: Run Qt tests
        run: ctest --test-dir build/qt --output-on-failure

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          name="seder-folder-compare-${{ steps.vars.outputs.release_tag }}-${{ matrix.name }}.${{ matrix.ext }}"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/qt/seder-folder-compare-qt.app -qmldir=qt/qml
          codesign --force --deep --options runtime \
            --identifier com.sederproductions.media-suite.folder-compare \
            --sign - \
            --timestamp=none \
            build/qt/seder-folder-compare-qt.app
          codesign --verify --deep --strict --verbose=2 build/qt/seder-folder-compare-qt.app
          ditto -c -k --keepParent build/qt/seder-folder-compare-qt.app "${{ steps.artifact.outputs.name }}"

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows
          Copy-Item build/qt/seder-folder-compare-qt.exe dist/windows/
          windeployqt --qmldir qt/qml dist/windows/seder-folder-compare-qt.exe
          $cert = New-SelfSignedCertificate `
            -Subject "CN=SEDER Productions, O=SEDER Productions, C=GB" `
            -Type CodeSigningCert -KeyUsage DigitalSignature `
            -KeyAlgorithm RSA -KeyLength 2048 `
            -CertStoreLocation Cert:\CurrentUser\My `
            -NotAfter (Get-Date).AddYears(5)
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64\\signtool.exe$" } | Select-Object -First 1).FullName
          if (-not $signtool) { $signtool = "signtool.exe" }
          Get-ChildItem -Path dist/windows -Recurse -Filter *.exe | ForEach-Object {
            & $signtool sign /fd SHA256 /sha1 $cert.Thumbprint /tr http://timestamp.digicert.com /td SHA256 $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $($_.FullName)" }
          }
          Compress-Archive -Path dist/windows/* -DestinationPath "${{ steps.artifact.outputs.name }}"

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp build/qt/seder-folder-compare-qt AppDir/usr/bin/seder-folder-compare
          cp packaging/linux/com.sederproductions.foldercompare.desktop AppDir/usr/share/applications/
          cp assets/icon.svg AppDir/usr/share/icons/hicolor/scalable/apps/com.sederproductions.foldercompare.svg
          curl -L -o linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-qt-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          export QML_SOURCES_PATHS=qt/qml
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage
          built_appimage="$(find . -maxdepth 1 -name '*.AppImage' ! -name 'linuxdeploy*.AppImage' -print -quit)"
          mv "$built_appimage" "${{ steps.artifact.outputs.name }}"

      - name: Create checksum
        shell: bash
        run: |
          artifact="${{ steps.artifact.outputs.name }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$artifact" > "$artifact.sha256"
          else
            shasum -a 256 "$artifact" > "$artifact.sha256"
          fi

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ${{ steps.artifact.outputs.name }}
            ${{ steps.artifact.outputs.name }}.sha256
          retention-days: 1

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: always() && needs.build.result == 'success' && needs.build.outputs.release_tag != '' && needs.build.outputs.release_tag != 'manual'
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Collect checksums
        run: |
          find dist -name "*.sha256" -print0 | sort -z | xargs -0 cat > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          draft: false
          prerelease: ${{ contains(needs.build.outputs.release_tag, '-rc') || contains(needs.build.outputs.release_tag, '-beta') || contains(needs.build.outputs.release_tag, '-alpha') }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.AppImage
            SHA256SUMS.txt
